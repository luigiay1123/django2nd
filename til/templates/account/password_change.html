{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block body %}
<div class="flex justify-center items-center min-h-[60vh]">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h2 class="text-2xl font-bold text-center mb-6">Change Password</h2>
    
    <form method="post" action="{% url 'account_change_password' %}">
      {% csrf_token %}
      
      {% if form.errors %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
          Please correct the errors below.
        </div>
      {% endif %}
      
      <div class="mb-4">
        <label for="id_oldpassword" class="block text-gray-700 text-sm font-medium mb-1">Current Password</label>
        <input type="password" name="oldpassword" id="id_oldpassword" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Current password">
      </div>
      
      <div class="mb-4">
        <label for="id_password1" class="block text-gray-700 text-sm font-medium mb-1">New Password</label>
        <input type="password" name="password1" id="id_password1" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="New password">
      </div>
      
      <div class="mb-6">
        <label for="id_password2" class="block text-gray-700 text-sm font-medium mb-1">New Password (again)</label>
        <input type="password" name="password2" id="id_password2" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="New password (again)">
      </div>
      
      <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded">Change Password</button>
    </form>
    
    <p class="text-center text-sm text-gray-600 mt-4">
      <a href="{% url 'profiles:edit' %}" class="text-blue-500 hover:underline">Back to Edit Profile</a>
    </p>
  </div>
</div>
{% endblock %}
