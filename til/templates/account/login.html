{% extends "base.html" %}

{% block title %}Login{% endblock title %}
{% block body %}
  <div class="flex justify-center items-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-lg-shadow-md w-full max-w-sm">
      <h2 class="text-2xl font-bold text-center mb-6">Login</h2>
      <form method="post" action="{% url 'account_login' %}">
        {% csrf_token %}

        {% if form.errors %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            Your username and password didn't match. Please try again.
          </div>
        {% endif %}

        <div class="mb-4">
          <label for="id_login" class="block text-gray-700 text-sm font-medium mb-1">Username</label>
          <input type="text" name="login" id="id_login" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Username">
        </div>

        <div class="mb-6">
          <label for="id_password" class="block text-gray-700 text-sm font-medium mb-1">Password</label>
          <input type="password" name="password" id="id_password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Password">
        </div>
        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded">Login</button>
        <p class="text-center text-sm text-gray-600 mt-3">
          <a href="{% url 'account_reset_password' %}" class="text-blue-500 hover:underline">Forgot your password?</a>
        </p>
      </form>
      
      <p class="text-center text-sm text-gray-600 mt-4">
        Don't have an account? <a href="{% url 'account_signup' %}" class="text-blue-500 hover:underline">SignUp</a>
      </p>
    </div>
  </div>
{% endblock body %}
