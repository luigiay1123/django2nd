{% extends "base.html" %}
{% block title %}Sign Up{% endblock title %}
{% block body %}
  <div class="flex justify-center items-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
      <h2 class="text-2xl font-bold text-center mb-6">Sign Up</h2>

      <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}

        {% if form.errors %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            Please correct the errors below.
          </div>
        {% endif %}

        <div class="mb-4">
          <label for="id_username" class="block text-gray-700 text-sm font-medium mb-1">Username</label>
          <input type="text" name="username" id="id_username" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Username">
        </div>

        <div class="mb-4">
          <label for="id_email" class="block text-gray-700 text-sm font-medium mb-1">Email (optional)</label>
          <input type="email" name="email" id="id_email" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Email">
        </div>

        <div class="mb-4">
          <label for="id_password1" class="block text-gray-700 text-sm font-medium mb-1">Password</label>
          <input type="password" name="password1" id="id_password1" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Password">
        </div>

        <div class="mb-6">
          <label for="id_password2" class="block text-gray-700 text-sm font-medium mb-1">Password (again)</label>
          <input type="password" name="password2" id="id_password2" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Password (again)">
        </div>

        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 py-4 rounded">Sign Up</button>
      </form>

      <p class="text-center text-sm text-gray-600 mt-4">Already have an account?
        <a href="{% url 'account_login' %}" class="text-blue-500 hover:underline">Login</a>
      </p>
    </div>
  </div>
{% endblock body %}
