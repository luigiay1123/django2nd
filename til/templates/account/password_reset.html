{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block body %}
<div class="flex justify-center items-center min-h-[60vh]">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h2 class="text-2xl font-bold text-center mb-6">Reset Password</h2>
    
    <p class="text-gray-600 text-sm mb-4">Enter your email address and we'll send you a link to reset your password.</p>
    
    <form method="post" action="{% url 'account_reset_password' %}">
      {% csrf_token %}
      
      {% if form.errors %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
          Please correct the errors below.
        </div>
      {% endif %}
      
      <div class="mb-6">
        <label for="id_email" class="block text-gray-700 text-sm font-medium mb-1">Email</label>
        <input type="email" name="email" id="id_email" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Email">
      </div>
      
      <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded">Send Reset Link</button>
    </form>
    
    <p class="text-center text-sm text-gray-600 mt-4">
      <a href="{% url 'account_login' %}" class="text-blue-500 hover:underline">Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
