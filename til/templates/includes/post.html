{% load thumbnail %}

<div class="w-full max-w-2xl min-w-[20rem] md:min-w-[38rem] mx-auto my-4 py-6 px-4 md:px-10 bg-white rounded-lg shadow-md">
  <div class="flex justify-between items-center">
    <span class="font-light text-gray-600 text-sm">{{ post.date|date:"F j, Y, g:i a" }}</span>
  </div>
  <div class="mt-2">
    <p class="mt-2 text-gray-600">{{ post.text }}</p>
  </div>
  <div class="flex justify-between items-center mt-4">
    {% if show_detail_link %}
      <a class="text-blue-600 hover:underline text-sm" href="{% url 'feed:detail' post.id %}">
        Read more
      </a>
    {% else %}
      <span>&nbsp;</span>
    {% endif %}
    <div>
      <a class="flex items-center" href="{% url 'profiles:detail' post.author.username %}">
        {% thumbnail post.author.profile.image "40x40" crop="center" as im %}
          <img class="w-8 h-8 md:w-10 md:h-10 object-cover rounded-full mr-2" src="{{ im.url }}" alt="avatar">
        {% endthumbnail %}
        <h1 class="text-gray-700 font-bold text-sm">{{ post.author.username }}</h1>
      </a>
    </div>
  </div>
</div>
